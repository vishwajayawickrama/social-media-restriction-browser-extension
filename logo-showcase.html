<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Social Media Time Guard - Lock Icon</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #111827;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      display: grid;
      gap: 22px;
      justify-items: center;
      text-align: center;
    }

    .icon {
      width: 192px;
      aspect-ratio: 1;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 48px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #667085;
      font-size: 15px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 128 128">
        <rect width="104" height="104" x="12" y="12" fill="#f8fafc" rx="28"/>
        <path fill="#111827" fill-rule="evenodd" d="M64 25c-14.4 0-26 11.6-26 26v11h-3c-5 0-9 4-9 9v21c0 5 4 9 9 9h58c5 0 9-4 9-9V71c0-5-4-9-9-9h-3V51c0-14.4-11.6-26-26-26zm-14 37h28V51c0-7.7-6.3-14-14-14s-14 6.3-14 14v11zm20 19a6 6 0 1 0-12 0c0 2.1 1.1 3.9 2.8 5v5.2a3.2 3.2 0 0 0 6.4 0V86c1.7-1.1 2.8-2.9 2.8-5z" clip-rule="evenodd"/>
      </svg>
    </div>
    <h1>Social Media Time Guard</h1>
    <p>Minimal lock icon for the browser extension.</p>
  </main>
</body>
</html>
