<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuan Settings</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="options">
    <main>
      <header class="app-header">
        <div class="brand">
          <img src="icons/logo.png" alt="" width="56" height="56">
          <div>
            <p class="eyebrow">Nuan</p>
            <h1>Settings</h1>
            <p>Reclaim the present with a shared time limit and tracked websites.</p>
          </div>
        </div>
      </header>

      <form id="settingsForm">
        <label class="field-card">
          <span>Time limit in minutes</span>
          <input id="limitMinutes" type="number" min="1" step="1" required>
        </label>

        <label class="field-card">
          <span>Tracked domains</span>
          <textarea id="domains" rows="12" spellcheck="false" required></textarea>
        </label>

        <div class="actions">
          <button type="submit">Save</button>
          <span id="message" role="status"></span>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
