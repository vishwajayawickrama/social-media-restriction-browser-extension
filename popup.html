<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuan</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup">
    <main>
      <header class="app-header">
        <div class="brand">
          <img src="icons/logo.png" alt="" width="48" height="48">
          <div>
            <h1>Nuan</h1>
            <p>Reclaim the present</p>
          </div>
        </div>
        <span id="stateBadge" class="badge">Loading</span>
      </header>

      <section class="metric">
        <span id="metricLabel">Remaining</span>
        <strong id="timeValue">--:--</strong>
      </section>

      <p id="details" class="muted">Checking the current tab.</p>

      <button id="optionsButton" class="primary-action" type="button">Settings</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
