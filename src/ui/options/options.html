<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuan Settings</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body class="options">
    <canvas class="dot-canvas" data-dot-canvas aria-hidden="true"></canvas>
    <main>
      <header class="app-header">
        <div class="brand">
          <img src="../../../icons/logo.png" alt="" width="56" height="56">
          <div>
            <p class="eyebrow">Nuan</p>
            <h1>Settings</h1>
            <p>Set your browsing limit and choose which domains count toward it.</p>
          </div>
        </div>
      </header>

      <form id="settingsForm">
        <section class="field-card limit-card">
          <label for="limitMinutes">Daily time limit</label>
          <div class="number-control">
            <button id="decreaseLimit" class="stepper-button" type="button" aria-label="Decrease time limit"></button>
            <input id="limitMinutes" type="number" min="1" step="1" required>
            <button id="increaseLimit" class="stepper-button" type="button" aria-label="Increase time limit"></button>
            <span>minutes</span>
          </div>
        </section>

        <section class="field-card domains-card">
          <div class="section-heading">
            <label for="domainInput">Tracked domains</label>
            <span id="domainCount">0 active</span>
          </div>
          <div id="selectedDomains" class="chip-list selected-domains" aria-live="polite"></div>
          <div class="domain-add-row">
            <input id="domainInput" type="text" inputmode="url" placeholder="Add a domain">
            <button id="addDomainButton" type="button">Add</button>
          </div>
          <div class="section-heading suggestions-heading">
            <span>Available domains</span>
          </div>
          <div id="availableDomains" class="chip-list available-domains"></div>
          <textarea id="domains" class="domains-bridge" rows="12" spellcheck="false"></textarea>
        </section>

        <div class="actions">
          <button type="submit">Save</button>
          <span id="message" role="status"></span>
        </div>
      </form>
    </main>

    <div id="confirmModal" class="modal-backdrop" hidden>
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <p class="eyebrow">Confirm</p>
        <h2 id="confirmTitle">Remove tracked domain?</h2>
        <p id="confirmMessage" class="muted"></p>
        <div class="modal-actions">
          <button id="cancelRemoveDomain" class="secondary-action" type="button">Cancel</button>
          <button id="confirmRemoveDomain" type="button">Remove</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script src="../../shared/dot-canvas.js"></script>
    <script src="options.js"></script>
  </body>
</html>
